version: "3.9"

services:
  scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: crautos_scraper_dev
    env_file:
      - .env
    ports:
      - "8081:8081"
    environment:
      # Override or set defaults here; .env takes precedence for secrets
      SCRAPER_HEADLESS: "${SCRAPER_HEADLESS:-true}"
      SCRAPER_DB_PATH: "${SCRAPER_DB_PATH:-/app/data/crautos.db}"
      SCRAPER_INITIAL_CONCURRENCY: "${SCRAPER_INITIAL_CONCURRENCY:-3}"
      SCRAPER_MIN_CONCURRENCY: "${SCRAPER_MIN_CONCURRENCY:-1}"
      SCRAPER_MAX_CONCURRENCY: "${SCRAPER_MAX_CONCURRENCY:-10}"
      AUTH_USERNAME: "${AUTH_USERNAME:-admin}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-admin}"
      SCRAPER_CRON: "0 0 * * *"
    volumes:
      # Live code reload during development
      - ./backend:/app
      # Persist SQLite database on the host
      - ./data:/app/data
    # Replaces the idle loop with the gunicorn scheduler
    command: gunicorn --bind 0.0.0.0:8081 --workers 1 --timeout 120 --access-logfile - --error-logfile - --log-level info cron.devops_job_orchestrator:server
    restart: always
    # Keeps container attachable for interactive exec sessions
    stdin_open: true
    tty: true
    stop_grace_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: crautos_api_dev
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - SCRAPER_DB_PATH=/app/data/crautos.db
    volumes:
      # Live code reload
      - ./backend:/app
      # Read DB
      - ./data:/app/data
  #   restart: always
  # frontend:
  #   build:
  #     context: ./DELETED_frontend
  #     dockerfile: Dockerfile
  #   container_name: crautos_frontend_dev
  #   ports:
  #     - "8050:8050"
  #   environment:
  #     - API_BASE=http://api:8000
  #   volumes:
  #     - ./frontend:/app
  #   restart: always

  typesense:
    image: typesense/typesense:26.0
    container_name: crautos_typesense_dev
    restart: always
    ports:
      - "8108:8108"
    volumes:
      - ./typesense-data:/data
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz123abc456}
      - TYPESENSE_ENABLE_CORS=true

  wrapped:
    build:
      context: ./wrapped-frontend
      dockerfile: Dockerfile
    container_name: crautos_wrapped_dev
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    volumes:
      - ./wrapped-frontend:/app
      - /app/node_modules
    command: npm run dev
    restart: always
