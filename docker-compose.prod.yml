services:
  scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile.scraper
    container_name: crautos_scraper_prod
    environment:
      - SERVICE_URL_SCRAPER_8081
      - 'TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz123abc456}'
      - 'SCRAPER_HEADLESS=true'
      - 'SCRAPER_DB_PATH=/app/data/crautos.db'
      - 'TYPESENSE_HOST=typesense'
      - 'TYPESENSE_PORT=8108'
      - 'TYPESENSE_PROTOCOL=http'
      - 'AUTH_USERNAME=${AUTH_USERNAME:-admin}'
      - 'AUTH_PASSWORD=${AUTH_PASSWORD:-admin}'
      - 'SCRAPER_CRON=0 7,19 * * *'
      - 'EV_SCRAPER_CRON=0 8,20 * * *'
      - 'CORI_SCRAPER_CRON=0 9,21 * * *'
      - 'VEINSA_SCRAPER_CRON=0 10,22 * * *'
      - 'TRUST_PROXY_HEADER=1'
    volumes:
      - ./data:/app/data
    expose:
      - "8081"
    command: gunicorn --bind 0.0.0.0:8081 --workers 1 --timeout 120 --access-logfile - --error-logfile - --log-level info cron.devops_job_orchestrator:server
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - curl
        - "-f"
        - "http://127.0.0.1:8081/health"
      interval: 5s
      timeout: 10s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: crautos_api_prod
    environment:
      - SERVICE_URL_API_8000
      - 'TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz123abc456}'
      - 'TYPESENSE_HOST=typesense'
      - 'TYPESENSE_PORT=8108'
      - 'TYPESENSE_PROTOCOL=http'
      - 'SCRAPER_DB_PATH=/app/data/crautos.db'
      - 'TRUST_PROXY_HEADER=1'
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      typesense:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - "-f"
        - "http://127.0.0.1:8000/docs"
      interval: 5s
      timeout: 10s
      retries: 50
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  typesense:
    build:
      context: ./typesense
      dockerfile: Dockerfile.prod
    container_name: crautos_typesense_prod
    restart: unless-stopped
    command: ["/opt/typesense-server", "--config", "/etc/typesense/config.ini"]
    expose:
      - "8108"
    volumes:
      - ./typesense-data:/data
    environment:
      - 'TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz123abc456}'
    healthcheck:
      test:
        - CMD
        - curl
        - "-f"
        - "http://127.0.0.1:8108/health"
      interval: 2s
      timeout: 10s
      retries: 30
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  wrapped_frontend:
    build:
      context: ./wrapped-frontend
      dockerfile: Dockerfile.prod
    container_name: crautos_wrapped_prod
    environment:
      - SERVICE_URL_WRAPPED_FRONTEND_3000
      - 'NEXT_PUBLIC_API_BASE=/'
      - 'INTERNAL_API_URL=http://api:8000'
      - 'TRUST_PROXY_HEADER=1'
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      typesense:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - "-f"
        - "http://127.0.0.1:3000/api/health"
      interval: 2s
      timeout: 10s
      retries: 30
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "0.50"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
