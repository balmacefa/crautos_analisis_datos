services:
  scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: crautos_scraper_prod
    # env_file removed to avoid failure if .env is missing on server; 
    # instead using explicit environment block for critical networking.
    ports:
      - "8081:8081"
    environment:
      SCRAPER_HEADLESS: "true"
      SCRAPER_DB_PATH: "/app/data/crautos.db"
      TYPESENSE_HOST: "typesense"
      TYPESENSE_PORT: "8108"
      TYPESENSE_PROTOCOL: "http"
      AUTH_USERNAME: "${AUTH_USERNAME:-admin}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-admin}"
      SCRAPER_CRON: "0 7,19 * * *"
      EV_SCRAPER_CRON: "0 8,20 * * *"
      CORI_SCRAPER_CRON: "0 9,21 * * *"
      VEINSA_SCRAPER_CRON: "0 10,22 * * *"
    volumes:
      - ./data:/app/data
    command: gunicorn --bind 0.0.0.0:8081 --workers 1 --timeout 120 --access-logfile - --error-logfile - --log-level info cron.devops_job_orchestrator:server
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')" ]
      interval: 1m
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: crautos_api_prod
    environment:
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
      - SCRAPER_DB_PATH=/app/data/crautos.db
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - typesense
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: crautos_frontend_prod
  #   ports:
  #     - "8050:8050"
  #   environment:
  #     - SERVICE_URL_FRONTEND=$SERVICE_URL_FRONTEND
  #     - API_BASE=http://api:8000
  #   restart: unless-stopped
  #   depends_on:
  #     api:
  #       condition: service_healthy
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  typesense:
    build:
      context: ./typesense
      dockerfile: Dockerfile.prod
    container_name: crautos_typesense_prod
    restart: unless-stopped
    command: [ "/opt/typesense-server", "--config", "/etc/typesense/config.ini" ]
    expose:
      - "8108"
    volumes:
      - ./typesense-data:/data
    environment:
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz123abc456}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8108/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.50'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  wrapped:
    build:
      context: ./wrapped-frontend
      dockerfile: Dockerfile.prod
    container_name: crautos_wrapped_prod
    expose:
      - "3000"
    # Port mapping removed to avoid host-level conflict (0.0.0.0:3000 allocated).
    # Coolify routes via 'expose' and internal networking.
    environment:
      - NEXT_PUBLIC_API_BASE=/
      - INTERNAL_API_URL=http://api:8000
      - SERVICE_URL_WRAPPED_FRONTEND=$SERVICE_URL_WRAPPED_FRONTEND
    restart: unless-stopped
    depends_on:
      - api
      - typesense
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: crautos_prod_network
