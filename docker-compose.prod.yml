version: "3.9"

services:
  scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: crautos_scraper_prod
    env_file:
      - .env
    environment:
      SCRAPER_HEADLESS: "true"
      SCRAPER_DB_PATH: "/app/data/crautos.db"
    volumes:
      # Data persistence for SQLite in production
      - ./data:/app/data
    restart: "no"
    stop_grace_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: crautos_api_prod
    # No host port mapping to avoid conflicts with other apps;
    # Internal communication via http://api:8000 still works.
    expose:
      - "8000"
    volumes:
      # Read DB access
      - ./data:/app/data
    restart: always
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crautos_frontend_prod
    ports:
      - "8050:8050"
    environment:
      - SERVICE_URL_FRONTEND=$SERVICE_URL_FRONTEND
      - API_BASE=http://api:8000
    restart: always


  scheduler:
    build:
      context: ./backend
      dockerfile: cron/Dockerfile
    container_name: crautos_scheduler_prod
    depends_on:
      - scraper
    ports:
      - "8081:8081"
    environment:
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin}
      - SCRAPER_CONTAINER_NAME=crautos_scraper_prod
      - SCRAPER_CRON="0 7,13,19 * * *"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always
