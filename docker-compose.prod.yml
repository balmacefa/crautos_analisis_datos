version: "3.9"

services:
  scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: crautos_scraper_prod
    env_file:
      - .env
    ports:
      - "8081:8081"
    environment:
      SCRAPER_HEADLESS: "true"
      SCRAPER_DB_PATH: "/app/data/crautos.db"
      AUTH_USERNAME: "${AUTH_USERNAME:-admin}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-admin}"
      SCRAPER_CRON: "0 7,13,19 * * *"
    volumes:
      # Data persistence for SQLite in production
      - ./data:/app/data
    command: gunicorn --bind 0.0.0.0:8081 --workers 1 --timeout 120 --access-logfile - --error-logfile - --log-level info cron.devops_job_orchestrator:server
    restart: always
    stop_grace_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: crautos_api_prod
    # No host port mapping to avoid conflicts with other apps;
    # Internal communication via http://api:8000 still works.
    expose:
      - "8000"
    volumes:
      # Read DB access
      - ./data:/app/data
    restart: always
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crautos_frontend_prod
    ports:
      - "8050:8050"
    environment:
      - SERVICE_URL_FRONTEND=$SERVICE_URL_FRONTEND
      - API_BASE=http://api:8000
    restart: always

  typesense:
    image: typesense/typesense:26.0
    container_name: crautos_typesense_prod
    restart: always
    expose:
      - "8108"
    volumes:
      - ./typesense-data:/data
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-xyz123abc456}
      - TYPESENSE_ENABLE_CORS=true

  wrapped:
    build:
      context: ./wrapped-frontend
      dockerfile: Dockerfile
    container_name: crautos_wrapped_prod
    ports:
      - "8051:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=https://api.tudominio.com # Ajustar en prod
    restart: always
    depends_on:
      - api
